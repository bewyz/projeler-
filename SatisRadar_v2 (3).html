<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SatışRadar v2 – Çoklu Mağaza</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 32px; display: flex; align-items: center; gap: 14px; }
.logo { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg,#2d6a4f,#1b4332); display: flex; align-items: center; justify-content: center; font-size: 22px; }
header h1 { font-size: 20px; font-weight: 800; }
header p { font-size: 12px; color: #8b949e; }
.badge { margin-left: auto; background: rgba(63,185,80,0.15); border: 1px solid #3fb950; color: #3fb950; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
.badge2 { margin-left: 8px; background: rgba(56,139,253,0.15); border: 1px solid #388bfd; color: #79c0ff; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 14px; padding: 20px 24px; margin-bottom: 16px; }
.card-title { font-size: 11px; font-weight: 700; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
.row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
.sg { flex: 1; min-width: 110px; }
.sg label { display: block; font-size: 11px; color: #8b949e; font-weight: 600; margin-bottom: 5px; }
input[type="time"] { width: 100%; padding: 9px 11px; border-radius: 8px; background: #0d1117; color: #79c0ff; font-size: 18px; font-weight: 800; outline: none; border: 1.5px solid #388bfd; font-family: inherit; }
input[type="number"] { width: 100%; padding: 9px 11px; border-radius: 8px; background: #0d1117; color: #ff7b72; font-size: 18px; font-weight: 800; outline: none; border: 1.5px solid #f85149; font-family: inherit; }
input[type="date"] { width: 100%; padding: 9px 11px; border-radius: 8px; background: #0d1117; color: #c9d1d9; font-size: 13px; font-weight: 600; outline: none; border: 1.5px solid #484f58; font-family: inherit; cursor: pointer; }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; cursor: pointer; }
.divider { height: 1px; background: #30363d; margin: 14px 0; }
.sep { color: #484f58; font-size: 18px; padding-bottom: 8px; }
.store-search { width: 100%; padding: 9px 12px; border-radius: 8px; background: #0d1117; color: #c9d1d9; font-size: 13px; outline: none; border: 1.5px solid #484f58; font-family: inherit; margin-bottom: 8px; }
.store-list-wrap { border: 1px solid #30363d; border-radius: 8px; background: #0d1117; max-height: 180px; overflow-y: auto; }
.store-list-wrap::-webkit-scrollbar { width: 6px; }
.store-list-wrap::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
.store-item { display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; font-size: 13px; }
.store-item:hover { background: rgba(255,255,255,0.04); }
.store-item input[type="checkbox"] { accent-color: #388bfd; width: 15px; height: 15px; cursor: pointer; }
.store-actions { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.sa-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-family: inherit; }
.sa-btn:hover { color: #c9d1d9; }
.sel-count { font-size: 11px; color: #8b949e; padding-top: 4px; }
#dropzone { border: 2px dashed #30363d; border-radius: 14px; padding: 28px 20px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
#dropzone:hover, #dropzone.drag { border-color: #388bfd; background: rgba(56,139,253,0.05); }
#dropzone.loaded { border-color: #238636; background: rgba(35,134,54,0.05); }
.dz-icon { font-size: 34px; margin-bottom: 6px; }
.dz-title { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
.dz-sub { font-size: 12px; color: #8b949e; }
.btn { padding: 10px 22px; border-radius: 8px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn-green { background: linear-gradient(135deg,#238636,#2ea043); color: #fff; }
.btn-sm { padding: 7px 16px; font-size: 12px; }
.summary-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.sc { flex: 1; min-width: 120px; border-radius: 12px; padding: 13px 16px; text-align: center; border: 1px solid; }
.sc .num { font-size: 28px; font-weight: 900; }
.sc .lbl { font-size: 11px; color: #8b949e; margin-top: 3px; }
.s-red { background: rgba(248,81,73,0.1); border-color: #f85149; color: #f85149; }
.s-green { background: rgba(63,185,80,0.1); border-color: #3fb950; color: #3fb950; }
.s-blue { background: rgba(56,139,253,0.08); border-color: #388bfd; color: #79c0ff; }
.s-yellow { background: rgba(210,153,34,0.1); border-color: #d29922; color: #e3b341; }
.s-purple { background: rgba(139,92,246,0.1); border-color: #7c3aed; color: #a78bfa; }
.view-tabs { display: flex; gap: 4px; background: #0d1117; border: 1px solid #30363d; border-radius: 10px; padding: 4px; width: fit-content; }
.vtab { padding: 6px 16px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; color: #8b949e; border: none; background: transparent; font-family: inherit; }
.vtab.active { background: #161b22; color: #c9d1d9; border: 1px solid #30363d; }
.store-summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; margin-bottom: 16px; }
.store-card { background: #0d1117; border: 1px solid #30363d; border-radius: 10px; padding: 13px 16px; cursor: pointer; transition: border-color 0.15s; }
.store-card:hover { border-color: #484f58; }
.store-card.has-gaps { border-color: rgba(248,81,73,0.4); }
.store-card.no-gaps { border-color: rgba(63,185,80,0.3); }
.sc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.sc-name { font-weight: 700; font-size: 13px; }
.sc-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
.sc-badge.red { background: rgba(248,81,73,0.15); color: #f85149; }
.sc-badge.green { background: rgba(63,185,80,0.12); color: #3fb950; }
.sc-meta { font-size: 11px; color: #8b949e; }
.sc-bar { height: 4px; background: #21262d; border-radius: 2px; margin-top: 8px; overflow: hidden; }
.sc-bar-fill { height: 100%; border-radius: 2px; background: #f85149; }
.rh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.rh h3 { font-size: 14px; font-weight: 700; }
table { width: 100%; border-collapse: collapse; }
.tw { border-radius: 12px; overflow: hidden; border: 1px solid #30363d; }
thead tr { background: #161b22; }
th { padding: 9px 13px; text-align: left; font-size: 11px; color: #8b949e; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; border-bottom: 1px solid #30363d; white-space: nowrap; }
tbody tr { border-bottom: 1px solid #21262d; }
tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
tbody tr:hover { background: rgba(255,255,255,0.05) !important; }
td { padding: 10px 13px; font-size: 13px; }
.group-hdr td { background: #1c2128 !important; color: #79c0ff; font-weight: 700; font-size: 12px; padding: 7px 13px; }
.empty-state { background: rgba(63,185,80,0.08); border: 1px solid #3fb950; border-radius: 12px; padding: 28px; text-align: center; }
.empty-state p { color: #3fb950; font-weight: 700; font-size: 15px; margin-top: 8px; }
.err { background: rgba(248,81,73,0.1); border: 1px solid #f85149; border-radius: 10px; padding: 11px 15px; color: #ff7b72; font-size: 13px; margin-bottom: 14px; display: none; }
#loading { text-align: center; padding: 24px; color: #8b949e; display: none; font-size: 14px; }
.result-search { padding: 8px 12px; border-radius: 8px; background: #0d1117; color: #c9d1d9; font-size: 13px; outline: none; border: 1.5px solid #484f58; font-family: inherit; width: 220px; }
</style>
</head>
<body>
<header>
  <div class="logo">📊</div>
  <div>
    <h1>SatışRadar <span style="font-size:13px;color:#8b949e;font-weight:400">v2</span></h1>
    <p>Çoklu Mağaza Boş Saat Aralığı Tespit Sistemi</p>
  </div>
  <div class="badge">🔒 Tam Offline</div>
  <div class="badge2">🏪 Çoklu Mağaza</div>
</header>

<div class="container">
  <div class="card">
    <div class="card-title">⚙️ Analiz Ayarları</div>
    <div class="row">
      <div class="sg"><label>Başlangıç Saati</label><input type="time" id="startTime" value="18:00"></div>
      <div class="sep">—</div>
      <div class="sg"><label>Bitiş Saati</label><input type="time" id="endTime" value="20:00"></div>
      <div class="sg" style="max-width:140px"><label>Min. Boşluk (dk)</label><input type="number" id="minGap" value="30" min="1" max="360"></div>
    </div>
    <div class="divider"></div>
    <div class="row">
      <div class="sg"><label>📅 Başlangıç Tarihi</label><input type="date" id="startDate"></div>
      <div class="sep">—</div>
      <div class="sg"><label>📅 Bitiş Tarihi</label><input type="date" id="endDate"></div>
      <div class="sg" style="max-width:170px;padding-bottom:2px">
        <button class="btn btn-green" onclick="reanalyze()" id="analyzeBtn" style="display:none;width:100%">🔍 Analiz Et</button>
      </div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="card-title" style="margin-bottom:8px">🏪 Mağaza Filtresi <span class="sel-count" id="selCount"></span></div>
      <div id="storeContainer" style="display:none">
        <input type="text" class="store-search" id="storeSearch" placeholder="Mağaza ara..." oninput="filterStoreList()">
        <div class="store-actions">
          <button class="sa-btn" onclick="selectAll()">Tümünü Seç</button>
          <button class="sa-btn" onclick="deselectAll()">Tümünü Kaldır</button>
          <button class="sa-btn" onclick="selectOnlyGaps()">⚠️ Sadece Boşlukluları</button>
          <span class="sel-count" id="selCount2"></span>
        </div>
        <div class="store-list-wrap" id="storeListEl"></div>
      </div>
      <div id="storeEmpty" style="font-size:13px;color:#484f58">Dosya yüklendikten sonra mağazalar buraya gelecek</div>
    </div>
  </div>

  <div id="dropzone" onclick="document.getElementById('fi').click()"
    ondrop="onDrop(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)">
    <input type="file" id="fi" accept=".xlsx,.xls" style="display:none" onchange="onFileChange(event)">
    <div id="dzc">
      <div class="dz-icon">📂</div>
      <div class="dz-title">Excel dosyasını buraya sürükleyin</div>
      <div class="dz-sub">veya tıklayarak seçin (.xlsx / .xls)</div>
    </div>
  </div>

  <div id="err" class="err"></div>
  <div id="loading">⏳ Analiz ediliyor...</div>
  <div id="results" style="display:none"></div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let parsedRecords = [];   // [{ts, magaza, bolge}] — pre-parsed, sorted
let allStores     = [];
let storesWithGaps = new Set();
let lastFound     = [];
let currentView   = 'magaza';
let filterText    = '';

// ─── Helpers ─────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');

function dateToISO(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function isoToSerial(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  return Math.round(Date.UTC(y,m-1,d)/86400000)+25569;
}
function serialToISO(s) {
  const d = new Date((s-25569)*86400000);
  return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`;
}
function isoToDisplay(iso) {
  const [y,m,d]=iso.split('-'); return `${d}.${m}.${y}`;
}
function minsToTime(m) {
  const tm = Math.round(m);
  return `${pad(Math.floor(tm/60)%24)}:${pad(tm%60)}`;
}
function timeToMins(t) {
  const [h,m]=t.split(':').map(Number); return h*60+m;
}
function isEticaret(name) {
  const u = name.toUpperCase();
  return ['E-TİCARET','ETİCARET','ETICARET','E TİCARET','ONLINE','WEB SATIS',
          'TRENDYOL','HEPSIBURADA','N11','GETIR','DİJİTAL','SANAL'].some(k=>u.includes(k));
}

// ─── File Handling ────────────────────────────────────────────────────────────
function onDrop(e) { e.preventDefault(); document.getElementById('dropzone').classList.remove('drag'); loadFile(e.dataTransfer.files[0]); }
function onDragOver(e) { e.preventDefault(); document.getElementById('dropzone').classList.add('drag'); }
function onDragLeave() { document.getElementById('dropzone').classList.remove('drag'); }
function onFileChange(e) { loadFile(e.target.files[0]); }

function loadFile(file) {
  if (!file) return;
  showLoading(true);
  hideResults();
  hideErr();

  document.getElementById('dropzone').classList.add('loaded');
  document.getElementById('dzc').innerHTML =
    `<div class="dz-icon">✅</div><div style="font-weight:700;color:#3fb950">${file.name}</div><div class="dz-sub">Farklı dosya için tıklayın</div>`;

  const reader = new FileReader();
  reader.onload = e => {
    try {
      processFile(e.target.result);
    } catch(err) {
      showErr('Dosya okunamadı: ' + err.message);
    }
    showLoading(false);
  };
  reader.readAsArrayBuffer(file);
}

function processFile(buffer) {
  // Read with cellDates:true to get JS Date objects for datetime columns
  const wb = XLSX.read(buffer, { type:'array', cellDates:true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, raw:true, defval:null });

  // Find first data row (skip header rows — any row where col[1] is a JS Date)
  let dataStart = 0;
  for (let i = 0; i < Math.min(10, rows.length); i++) {
    if (rows[i] && rows[i][1] instanceof Date) { dataStart = i; break; }
  }

  // Pre-parse all records: extract only what we need
  // Each record: { dateISO, dateSerial, mins (minutes since midnight), magaza, bolge }
  const recs = [];
  for (let i = dataStart; i < rows.length; i++) {
    const row = rows[i];
    if (!row) continue;
    const dt = row[1];
    if (!(dt instanceof Date) || isNaN(dt.getTime())) continue;
    const magaza = String(row[2]||'').trim();
    if (!magaza || isEticaret(magaza)) continue;
    const dateISO = dateToISO(dt);
    const dateSerial = isoToSerial(dateISO);
    const mins = dt.getHours()*60 + dt.getMinutes();
    const bolge = String(row[4]||'').trim();
    recs.push({ dateISO, dateSerial, mins, magaza, bolge });
  }

  // Sort by magaza → dateSerial → mins
  recs.sort((a,b) => {
    if (a.magaza < b.magaza) return -1;
    if (a.magaza > b.magaza) return 1;
    if (a.dateSerial !== b.dateSerial) return a.dateSerial - b.dateSerial;
    return a.mins - b.mins;
  });

  parsedRecords = recs;

  // Extract unique stores
  const storeSet = new Set(recs.map(r=>r.magaza));
  allStores = [...storeSet].sort();

  // Auto-fill date range
  let minSerial = Infinity, maxSerial = -Infinity;
  for (const r of recs) {
    if (r.dateSerial < minSerial) minSerial = r.dateSerial;
    if (r.dateSerial > maxSerial) maxSerial = r.dateSerial;
  }
  if (minSerial < Infinity && !document.getElementById('startDate').value)
    document.getElementById('startDate').value = serialToISO(minSerial);
  if (maxSerial > -Infinity && !document.getElementById('endDate').value)
    document.getElementById('endDate').value = serialToISO(maxSerial);

  buildStoreListUI();
  document.getElementById('analyzeBtn').style.display = 'block';
  analyze();
}

// ─── Store List UI ────────────────────────────────────────────────────────────
function buildStoreListUI() {
  document.getElementById('storeEmpty').style.display = 'none';
  document.getElementById('storeContainer').style.display = 'block';
  renderStoreListUI(allStores, allStores);
  updateSelCount();
}

function renderStoreListUI(visible, checkedList) {
  document.getElementById('storeListEl').innerHTML = visible.map(s => {
    const hasGap = storesWithGaps.has(s);
    const chk = checkedList.includes(s);
    return `<label class="store-item">
      <input type="checkbox" class="store-cb" value="${escHtml(s)}" ${chk?'checked':''} onchange="updateSelCount()">
      <span>${escHtml(s)}</span>${hasGap?' <span style="color:#f85149;font-size:10px">⚠️</span>':''}
    </label>`;
  }).join('');
}

function filterStoreList() {
  const q = document.getElementById('storeSearch').value.toLowerCase();
  const visible = q ? allStores.filter(s=>s.toLowerCase().includes(q)) : allStores;
  const checked = getChecked();
  renderStoreListUI(visible, checked);
}

function getChecked() { return [...document.querySelectorAll('.store-cb:checked')].map(c=>c.value); }
function selectAll() { document.querySelectorAll('.store-cb').forEach(c=>c.checked=true); updateSelCount(); }
function deselectAll() { document.querySelectorAll('.store-cb').forEach(c=>c.checked=false); updateSelCount(); }
function selectOnlyGaps() { document.querySelectorAll('.store-cb').forEach(c=>c.checked=storesWithGaps.has(c.value)); updateSelCount(); }
function updateSelCount() {
  const n = getChecked().length, t = allStores.length;
  const txt = n===t ? `Tümü seçili (${t})` : `${n} / ${t} seçili`;
  document.getElementById('selCount').textContent = txt;
  document.getElementById('selCount2').textContent = txt;
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ─── Analyze ─────────────────────────────────────────────────────────────────
function reanalyze() { if (parsedRecords.length) analyze(); }

function analyze() {
  if (!parsedRecords.length) return;
  showLoading(true);
  hideResults();
  hideErr();

  // Use setTimeout so UI updates (loading spinner shows) before heavy work
  setTimeout(() => {
    try {
      const stMin = timeToMins(document.getElementById('startTime').value);
      const etMin = timeToMins(document.getElementById('endTime').value);
      const mg    = Number(document.getElementById('minGap').value);
      const sdVal = document.getElementById('startDate').value;
      const edVal = document.getElementById('endDate').value;
      const sdS   = sdVal ? isoToSerial(sdVal) : 0;
      const edS   = edVal ? isoToSerial(edVal) : 99999;
      const sel   = getChecked();

      const found = [];

      for (let i = 1; i < parsedRecords.length; i++) {
        const cur  = parsedRecords[i];
        const prev = parsedRecords[i-1];

        // Must be same store and same day
        if (cur.magaza !== prev.magaza) continue;
        if (cur.dateSerial !== prev.dateSerial) continue;

        // Date range filter
        if (cur.dateSerial < sdS || cur.dateSerial > edS) continue;

        // Store filter
        if (sel.length > 0 && !sel.includes(cur.magaza)) continue;

        // Gap: prev satış bitiş saati analiz aralığı içinde veya öncesinde,
        // cur satış başlangıcı analiz aralığı içinde olmalı
        // Basit yaklaşım: boşluk bölgesi [prev.mins, cur.mins] analiz aralığıyla kesişmeli
        const gapStart = prev.mins;
        const gapEnd   = cur.mins;
        const overlapStart = Math.max(gapStart, stMin);
        const overlapEnd   = Math.min(gapEnd, etMin);
        if (overlapEnd <= overlapStart) continue;

        // Boşluk süresi (analiz aralığındaki kesişim)
        const fark = gapEnd - gapStart;
        if (fark <= mg) continue;

        found.push({
          magaza:   cur.magaza,
          tarih:    isoToDisplay(cur.dateISO),
          tarihISO: cur.dateISO,
          bas:      minsToTime(gapStart),
          bit:      minsToTime(gapEnd),
          sure:     Math.round(fark),
          bolge:    cur.bolge,
        });
      }

      // Update gap store set
      storesWithGaps = new Set(found.map(r=>r.magaza));
      lastFound = found;

      // Refresh store list with gap indicators
      filterStoreList();

      renderResults(found, stMin, etMin, mg, sdVal, edVal, sel.length);
    } catch(err) {
      showErr('Hata: ' + err.message);
    }
    showLoading(false);
  }, 30);
}

// ─── Render Results ───────────────────────────────────────────────────────────
function renderResults(found, stMin, etMin, mg, sd, ed, selCount) {
  const dateLabel = (sd && ed)
    ? `${sd.split('-').reverse().join('.')} – ${ed.split('-').reverse().join('.')}`
    : 'Tüm tarihler';
  const stStr = minsToTime(stMin), etStr = minsToTime(etMin);

  // Group by store
  const byStore = {};
  for (const r of found) {
    (byStore[r.magaza] || (byStore[r.magaza] = [])).push(r);
  }
  const storesSorted = Object.keys(byStore).sort((a,b) => byStore[b].length - byStore[a].length);
  const maxSure = found.reduce((m,r) => r.sure>m?r.sure:m, 1);

  window._byStore = byStore;
  window._storesSorted = storesSorted;
  window._maxSure = maxSure;
  window._stStr = stStr; window._etStr = etStr;
  window._dateLabel = dateLabel;

  let html = '<div class="summary-row">';
  if (found.length > 0) {
    html += `<div class="sc s-red"><div class="num">${found.length}</div><div class="lbl">Toplam Boşluk</div></div>`;
    html += `<div class="sc s-purple"><div class="num">${storesSorted.length}</div><div class="lbl">Boşluklu Mağaza</div></div>`;
  } else {
    html += `<div class="sc s-green"><div class="num">0</div><div class="lbl">Boşluk Yok ✅</div></div>`;
  }
  html += `<div class="sc s-blue"><div class="num" style="font-size:14px">${stStr} – ${etStr}</div><div class="lbl">${dateLabel}</div></div>`;
  if (found.length > 0)
    html += `<div class="sc s-yellow"><div class="num">${maxSure} dk</div><div class="lbl">En Uzun Boşluk</div></div>`;
  html += `<div class="sc" style="background:rgba(56,139,253,0.08);border-color:#388bfd;color:#79c0ff"><div class="num">${allStores.length}</div><div class="lbl">Analiz Edilen Mağaza</div></div>`;
  html += '</div>';

  if (found.length === 0) {
    html += `<div class="empty-state"><div style="font-size:34px">✅</div><p>Belirtilen kriterlerde hiçbir mağazada boşluk bulunamadı</p></div>`;
    showResults(html); return;
  }

  html += `<div class="rh">
    <div class="view-tabs">
      <button class="vtab ${currentView==='magaza'?'active':''}" onclick="switchView('magaza', true)">🏪 Mağaza Özeti</button>
      <button class="vtab ${currentView==='detay'?'active':''}" onclick="switchView('detay')">📋 Detay Listesi</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input type="text" class="result-search" id="resultSearch" placeholder="Mağaza ara..." oninput="onResultSearch()" value="${escHtml(filterText)}">
      <button class="btn btn-green btn-sm" onclick="downloadExcel()">📥 Excel İndir</button>
    </div>
  </div>
  <div id="viewContent">${currentView==='magaza' ? buildMagazaOzet(byStore, storesSorted, maxSure, filterText) : buildDetayListe(found, byStore, storesSorted, maxSure, filterText)}</div>`;

  showResults(html);
}

function buildMagazaOzet(byStore, storesSorted, maxSure, filter) {
  const filt = filter.toLowerCase();
  const filtered = filt ? storesSorted.filter(s=>s.toLowerCase().includes(filt)) : storesSorted;
  const noGap = allStores.filter(s => !byStore[s] && (!filt || s.toLowerCase().includes(filt)));

  let html = '<div class="store-summary-grid">';
  for (const s of filtered) {
    const gaps = byStore[s];
    const maxG = gaps.reduce((m,r)=>r.sure>m?r.sure:m,0);
    const pct  = Math.round(maxG/maxSure*100);
    html += `<div class="store-card has-gaps" onclick="drillStore('${escHtml(s)}')">
      <div class="sc-header"><span class="sc-name">🏪 ${escHtml(s)}</span><span class="sc-badge red">${gaps.length} boşluk</span></div>
      <div class="sc-meta">En uzun: <strong style="color:#f85149">${maxG} dk</strong> &nbsp;|&nbsp; ${gaps[0].bolge||'—'}</div>
      <div class="sc-bar"><div class="sc-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }
  for (const s of noGap) {
    html += `<div class="store-card no-gaps">
      <div class="sc-header"><span class="sc-name">🏪 ${escHtml(s)}</span><span class="sc-badge green">✅ Boşluk yok</span></div>
      <div class="sc-meta" style="color:#3fb950">Satış kesintisi tespit edilmedi</div>
    </div>`;
  }
  html += '</div>';
  return html;
}

function buildDetayListe(found, byStore, storesSorted, maxSure, filter) {
  const filt = filter.toLowerCase();
  const filtered = filt ? storesSorted.filter(s=>s.toLowerCase().includes(filt)) : storesSorted;

  // Back button when drilled into a specific store
  let html = '';
  if (filt && filtered.length <= 3) {
    html += `<div style="margin-bottom:10px">
      <button class="sa-btn" onclick="switchView('magaza', true)" style="font-size:13px;padding:7px 14px">
        ← Tüm Mağazalara Dön
      </button>
    </div>`;
  }

  html += '<div class="tw"><table><thead><tr><th>Mağaza</th><th>Tarih</th><th>Boşluk Baş.</th><th>Boşluk Bit.</th><th>Süre</th><th>Bölge Yöneticisi</th></tr></thead><tbody>';
  for (const s of filtered) {
    const gaps = byStore[s];
    html += `<tr class="group-hdr"><td colspan="6">🏪 ${escHtml(s)} — ${gaps.length} boşluk</td></tr>`;
    for (const r of gaps) {
      const pct = Math.round(r.sure/maxSure*100);
      const col = r.sure>60?'#f85149':r.sure>40?'#e3b341':'#ff7b72';
      html += `<tr>
        <td style="font-weight:700;color:#8b949e;font-size:12px">${escHtml(r.magaza)}</td>
        <td style="color:#8b949e">${r.tarih}</td>
        <td style="font-size:15px;font-weight:800;color:#f85149">${r.bas}</td>
        <td style="font-size:15px;font-weight:800;color:#f85149">${r.bit}</td>
        <td><div style="display:flex;align-items:center;gap:8px">
          <div style="height:6px;width:55px;border-radius:3px;background:#21262d;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${col};border-radius:3px"></div></div>
          <span style="font-weight:800;color:${col}">${r.sure} dk</span></div></td>
        <td style="font-size:12px;color:#8b949e">${escHtml(r.bolge)}</td>
      </tr>`;
    }
  }
  html += '</tbody></table></div>';
  return html;
}

function switchView(v, clearFilter) {
  if (clearFilter) { filterText = ''; const inp = document.getElementById('resultSearch'); if(inp) inp.value=''; }
  currentView = v;
  document.querySelectorAll('.vtab').forEach(t => {
    t.classList.toggle('active', (v==='magaza'&&t.textContent.includes('Özet'))||(v==='detay'&&t.textContent.includes('Detay')));
  });
  const vc = document.getElementById('viewContent');
  if (!vc) return;
  vc.innerHTML = v==='magaza'
    ? buildMagazaOzet(window._byStore, window._storesSorted, window._maxSure, filterText)
    : buildDetayListe(lastFound, window._byStore, window._storesSorted, window._maxSure, filterText);
}

function onResultSearch() {
  filterText = document.getElementById('resultSearch').value;
  switchView(currentView);
}

function drillStore(s) {
  filterText = s;
  currentView = 'detay';
  document.querySelectorAll('.vtab').forEach(t => t.classList.toggle('active', t.textContent.includes('Detay')));
  const vc = document.getElementById('viewContent');
  if (vc) vc.innerHTML = buildDetayListe(lastFound, window._byStore, window._storesSorted, window._maxSure, s);
  const inp = document.getElementById('resultSearch');
  if (inp) inp.value = s;
}

// ─── Excel Export ─────────────────────────────────────────────────────────────
function downloadExcel() {
  if (!lastFound.length) return;
  const f = lastFound;
  const wb = XLSX.utils.book_new();

  // Sayfa 1: Tüm boşluklar
  const ozet = [
    ['SATIŞ BOŞLUK ANALİZİ'],
    [],
    ['Kontrol Saati', `${window._stStr} – ${window._etStr}`],
    ['Tarih Aralığı', window._dateLabel],
    ['Toplam Boşluk', f.length],
    ['Boşluklu Mağaza', window._storesSorted.length],
    [],
    ['Mağaza','Tarih','Başlangıç','Bitiş','Süre (dk)','Bölge Yöneticisi'],
    ...f.map(r=>[r.magaza, r.tarih, r.bas, r.bit, r.sure, r.bolge])
  ];
  const ws1 = XLSX.utils.aoa_to_sheet(ozet);
  ws1['!cols'] = [26,14,12,12,12,22].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws1, 'Özet');

  // Sayfa 2: Mağaza bazlı özet
  const magRows = [['Mağaza','Bölge Yöneticisi','Boşluk Sayısı','En Uzun (dk)','Toplam (dk)']];
  for (const s of window._storesSorted) {
    const gaps = window._byStore[s];
    magRows.push([s, gaps[0].bolge, gaps.length,
      gaps.reduce((m,r)=>r.sure>m?r.sure:m,0),
      gaps.reduce((a,r)=>a+r.sure,0)]);
  }
  const ws2 = XLSX.utils.aoa_to_sheet(magRows);
  ws2['!cols'] = [26,22,14,14,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws2, 'Mağaza Özeti');

  // Sayfa 3+: Her boşluklu mağaza
  for (const s of window._storesSorted) {
    const gaps = window._byStore[s];
    const rows = [['Mağaza',s],['Bölge',gaps[0].bolge],[],
      ['Tarih','Başlangıç','Bitiş','Süre (dk)'],
      ...gaps.map(r=>[r.tarih,r.bas,r.bit,r.sure])];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [14,12,12,12].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb, ws, s.substring(0,31));
  }

  XLSX.writeFile(wb, `SatisRadar_${window._stStr.replace(':','-')}_${window._etStr.replace(':','-')}.xlsx`);
}

// ─── UI Helpers ───────────────────────────────────────────────────────────────
function showLoading(v) { document.getElementById('loading').style.display = v?'block':'none'; }
function showResults(html) { const el=document.getElementById('results'); el.innerHTML=html; el.style.display='block'; }
function hideResults() { document.getElementById('results').style.display='none'; }
function showErr(msg) { const el=document.getElementById('err'); el.textContent='⚠️ '+msg; el.style.display='block'; showLoading(false); }
function hideErr() { document.getElementById('err').style.display='none'; }
</script>
